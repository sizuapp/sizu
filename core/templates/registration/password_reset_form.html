{% extends "base.html" %}
{% load static %}

{% block title %}Recuperar Contraseña - SIZU{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="inline-block p-3 rounded-full bg-indigo-50 mb-4">
                <img src="{% static 'logo_sizu.png' %}" alt="Sizu Logo" class="h-16 w-16 mx-auto">
            </div>
            <h2 class="text-3xl font-bold text-[#0f3567]">Recupera tu contraseña</h2>
            <p class="text-gray-500 mt-2">Ingresa tu correo y te enviaremos las instrucciones.</p>
        </div>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            {{ form.as_p }}

            <button type="submit" class="w-full bg-[#6420CB] hover:bg-[#5019a0] text-white font-bold py-3 px-4 rounded-xl transition duration-300 transform hover:scale-[1.02] shadow-md mt-4">
                Enviar Enlace de Recuperación
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-600">
            ¿Recordaste tu contraseña? <a href="{% url 'login' %}" class="font-semibold text-[#6420CB] hover:underline">Inicia sesión</a>
        </p>
    </div>
</div>
{% endblock %}
