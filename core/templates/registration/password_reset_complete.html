{% extends "base.html" %}
{% load static %}

{% block title %}Contraseña Cambiada - SIZU{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 text-center">
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-4">
            <svg class="h-8 w-8 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        <h2 class="text-3xl font-bold text-[#0f3567]">¡Contraseña actualizada!</h2>
        <p class="text-gray-500 mt-2">
            Tu contraseña ha sido cambiada con éxito. Ya puedes iniciar sesión.
        </p>
        <div class="mt-8">
            <a href="{% url 'login' %}" class="w-full inline-block bg-[#6420CB] hover:bg-[#5019a0] text-white font-bold py-3 px-4 rounded-xl transition duration-300 transform hover:scale-[1.02] shadow-md">
                Ir a Iniciar Sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
