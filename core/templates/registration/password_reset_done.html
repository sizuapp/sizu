{% extends "base.html" %}
{% load static %}

{% block title %}Enlace Enviado - SIZU{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 text-center">
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-4">
            <svg class="h-8 w-8 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <h2 class="text-3xl font-bold text-[#0f3567]">Revisa tu correo</h2>
        <p class="text-gray-500 mt-2">
            Te hemos enviado un correo con las instrucciones. Si no lo ves, revisa tu carpeta de spam.
        </p>
        <div class="mt-8">
            <a href="{% url 'login' %}" class="w-full inline-block bg-[#0f3567] hover:bg-[#0a254a] text-white font-bold py-3 px-4 rounded-xl transition duration-300 transform hover:scale-[1.02] shadow-md">
                Volver a Inicio de Sesión
            </a>
        </div>
    </div>
</div>
{% endblock %}
