{% extends 'base.html' %}
{% load static %}

{% block title %}Iniciar Sesión - SIZU{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <div class="inline-block p-3 rounded-full bg-indigo-50 mb-4">
                <img src="{% static 'logo_sizu.png' %}" alt="Sizu Logo" class="h-16 w-16 mx-auto">
            </div>
            <h2 class="text-3xl font-bold text-[#0f3567]">Bienvenido de nuevo</h2>
            <p class="text-gray-500 mt-2">Ingresa a tu cuenta para seguir aprendiendo</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <!-- El formulario se renderiza automáticamente con los estilos globales definidos en base.html -->
            {{ form.as_p }}

            <div class="flex justify-end">
                <a href="{% url 'password_reset' %}" class="text-sm font-medium text-[#6420CB] hover:text-[#5019a0] hover:underline">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="w-full bg-[#6420CB] hover:bg-[#5019a0] text-white font-bold py-3 px-4 rounded-xl transition duration-300 transform hover:scale-[1.02] shadow-md mt-4">
                Iniciar Sesión
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-600">
            ¿No tienes cuenta? <a href="{% url 'signup' %}" class="font-semibold text-[#6420CB] hover:underline">Regístrate aquí</a>
        </p>
    </div>
</div>
{% endblock %}
